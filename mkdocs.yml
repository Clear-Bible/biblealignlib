site_name: biblealignlib
repo_url: https://github.com/Clear-Bible/biblealignlib
site_description: Python library for managing word-level alignments between Bible source texts and target translations.
site_author: Sean Boisen
edit_uri: edit/main/docs/
repo_name: Clear-Bible/biblealignlib
copyright: © 2022–2026 by <a href="http://www.clear.bible">Clear Bible, Inc</a>

nav:
  - Home: index.md
  - Tutorials:
      - tutorials/index.md
      - Your First Alignment: tutorials/first-alignment.md
  - How-to Guides:
      - how-to/index.md
      - Load an Alignment Set: how-to/load-alignment-set.md
      - Search Alignments: how-to/search-alignments.md
      - Compare Alignment Sets: how-to/compare-alignment-sets.md
      - Export Alignment Data: how-to/export-alignments.md
      - Score Alignments: how-to/score-alignments.md
  - Reference:
      - reference/index.md
      - burrito: reference/burrito.md
      - util: reference/util.md
      - autoalign: reference/autoalign.md
      - interlinear: reference/interlinear.md
  - Explanation:
      - explanation/index.md
      - The Alignment Model: explanation/alignment-model.md
      - BCVWPID Identifiers: explanation/bcvwpid.md
      - Scripture Burrito Format: explanation/scripture-burrito.md
  - Release Notes: ReleaseNotes.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
            setup_commands:
                - import sys
                - sys.path.append('../')

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Clear-Bible/biblealignlib
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/biblealignlib

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - def_list
  - footnotes
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
